<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4537E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="驚喜生成器">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>伴侶日常驚喜生成器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background-color: #FFF5F7;}
.app{max-width:400px;margin:0 auto;padding:1.25rem 1rem 2rem;font-family:system-ui, -apple-system, sans-serif}

/* 頂部控制列 */
.top-bar{display:flex;justify-content:center;align-items:center;margin-bottom:1rem;padding:0 4px}
.app-title{font-size:16px;font-weight:600;color:#993556;display:flex;align-items:center;gap:6px}

.tabs{display:flex;border-radius:28px;padding:3px;margin-bottom:1.25rem;background:#FBEAF0;border:0.5px solid #ED93B1}
.tab{flex:1;padding:8px 0;font-size:13px;border:none;background:none;border-radius:24px;cursor:pointer;color:#993556;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.on{background:#D4537E;color:#fff;font-weight:500}

/* 數據列 */
.stats{display:flex;gap:8px;margin-bottom:1.1rem}
.stat{flex:1;border-radius:12px;padding:9px 6px;text-align:center;border:0.5px solid #F4C0D1;background:#FBEAF0;cursor:default}
.stat.clickable{cursor:pointer;transition:background .15s}
.stat.clickable:hover{background:#F4D0DC}
.stat.clickable.on{background:#D4537E;border-color:#D4537E}
.stat.clickable.on b,.stat.clickable.on span{color:#fff}
.stat b{display:block;font-size:20px;font-weight:500;color:#993556}
.stat span{display:block;font-size:11px;color:#72243E;margin-top:1px}

/* 刷新驚喜按鈕 */
.stat.btn-center{display:flex;align-items:center;justify-content:center;flex-direction:column}
.stat.btn-center span{font-size:14px;font-weight:500;color:#993556;margin-top:0}
.stat.btn-center:hover span{color:#72243E}
.progress-text{font-size:9px !important;color:#D4537E;opacity:0.8;margin-top:2px}

/* 卡片舞台空間 */
.stage{position:relative;height:420px;display:flex;align-items:center;justify-content:center;margin-bottom:.6rem;overflow:hidden}
.bg2,.bg3{position:absolute;width:calc(100% - 20px);max-width:368px;height:420px;border-radius:20px;border:0.5px solid #F4C0D1;background:#FFF9FA;pointer-events:none}
.bg3{transform:translateY(16px) scale(0.93);z-index:0}
.bg2{transform:translateY(8px) scale(0.96);z-index:1}
.card{position:absolute;width:100%;max-width:368px;border-radius:20px;padding:1.5rem 1.4rem 1.3rem;border:0.5px solid #ED93B1;background:#ffffff;z-index:2;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:pan-y;box-shadow:0 4px 12px rgba(244,192,209,0.2)}
.card.grab{cursor:grabbing}
.card.go-l{animation:goL .26s ease-in forwards}
.card.go-r{animation:goR .26s ease-in forwards}
.card.come-l{animation:comeL .26s ease-out forwards}
.card.come-r{animation:comeR .26s ease-out forwards}
@keyframes goL{to{transform:translateX(-115%) rotate(-14deg);opacity:0}}
@keyframes goR{to{transform:translateX(115%) rotate(14deg);opacity:0}}
@keyframes comeL{from{transform:translateX(-115%) rotate(-14deg);opacity:0}to{transform:translateX(0) rotate(0deg);opacity:1}}
@keyframes comeR{from{transform:translateX(115%) rotate(14deg);opacity:0}to{transform:translateX(0) rotate(0deg);opacity:1}}

/* 滑動提示標籤（已取消向右滑出現不喜歡的字樣，只保留向左滑的下一個靈感提示） */
.ind{position:absolute;top:1rem;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .1s;z-index:10}
.ind.l{left:1rem;background:#FFEBEF;color:#D4537E}
.ind.r{right:1rem;background:#EBFBF5;color:#0F6E56}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 11px;border-radius:16px;margin-bottom:.85rem}
.badge.d{background:#EEEDFE;color:#3C3489}
.badge.w{background:#E1F5EE;color:#085041}
.badge.s{background:#FBEAF0;color:#72243E}
.badge.t{background:#FAEEDA;color:#633806}

.ctitle{font-size:19px;font-weight:500;color:#332025;line-height:1.4;margin-bottom:.7rem}
.cdesc{font-size:13px;color:#665559;line-height:1.72}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:.8rem}
.tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#FAFAFA;color:#88777A;border:0.5px solid #EAEAEA}
.status-row{margin-top:.7rem;min-height:20px}
.done-tag{font-size:11px;padding:2px 9px;border-radius:7px;background:#E1F5EE;color:#085041;display:inline-flex;align-items:center;gap:3px}
.pend-tag{font-size:11px;color:#D4537E;display:inline-block}

.cbot{margin-top:.9rem;padding-top:.85rem;border-top:0.5px solid #F4C0D1}
.cbot-row{display:flex;align-items:center;gap:8px}
.savebtn{font-size:12px;padding:6px 14px;border-radius:9px;background:none;border:0.5px solid #ED93B1;color:#993556;cursor:pointer;white-space:nowrap;flex-shrink:0}
.savebtn:hover{background:#FBEAF0}
.savebtn.on{background:#FBEAF0;border-color:#D4537E;color:#72243E}
.donebtn{flex:1;font-size:12px;padding:6px 0;border-radius:9px;background:none;border:0.5px solid #9FE1CB;color:#0F6E56;cursor:pointer;text-align:center;white-space:nowrap}
.donebtn:hover{background:#F0FBF7}
.donebtn.done{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.donebtn.hidden{visibility:hidden;pointer-events:none}

/* 🎯 【優化與對齊】完美設定最底下文字：左邊靠左、右邊靠右 */
.nav-hint{display:flex;justify-content:space-between;width:100%;max-width:368px;margin:0 auto .35rem;padding:0 4px}
.nav-hint span{font-size:12px;color:#D4537E;display:flex;align-items:center;gap:3px}
.nav-hint .left-hint{text-align:left;}
.nav-hint .right-hint{text-align:right;}

.ctr{text-align:center;font-size:12px;color:#D4537E;margin-bottom:.85rem}
.no-card{text-align:center;padding:3rem 1rem;border-radius:20px;border:0.5px solid #F4C0D1;background:#FFF9FA;width:100%}
.no-card p{color:#88777A;font-size:13px;line-height:1.8;margin-top:.5rem}

/* 彈出提示視窗 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center}
.dialog{background:#ffffff !important;border-radius:18px;padding:1.5rem;max-width:320px;width:90%;text-align:center;border:0.5px solid #ED93B1;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.dialog h3{font-size:16px;font-weight:600;color:#332025;margin-bottom:.6rem;display:flex;align-items:center;justify-content:center;gap:6px}
.dialog p{font-size:13px;color:#665559;line-height:1.65;margin-bottom:1.25rem}
.dialog-btns{display:flex;gap:8px}
.dbtn{flex:1;padding:9px 0;border-radius:10px;font-size:13px;cursor:pointer;border:0.5px solid #ED93B1;font-weight:500}
.dbtn.cancel{background:none;color:#993556}
.dbtn.cancel:hover{background:#FBEAF0}
.dbtn.confirm{background:#D4537E;color:#fff;border-color:#D4537E}
.dbtn.confirm:hover{background:#B33E68}
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="app-title"><i class="ti ti-heart-handshake"></i> 伴侶日常驚喜建議</div>
  </div>

  <div class="tabs">
    <button class="tab on" id="te" onclick="goTab('e')"><i class="ti ti-sparkles"></i> 探索驚喜</button>
    <button class="tab" id="ts" onclick="goTab('s')"><i class="ti ti-heart"></i> 我的收藏</button>
  </div>

  <div id="ve">
    <div class="stats">
      <div class="stat"><b id="n-saved">0</b><span>已收藏</span></div>
      <div class="stat"><b id="n-done">0</b><span>已執行</span></div>
      <div class="stat clickable btn-center" id="stat-today" onclick="askRefresh()">
        <span>刷新驚喜</span>
      </div>
    </div>
    <div class="stage" id="estage"></div>
    <div class="nav-hint">
      <span class="left-hint"><i class="ti ti-arrow-left"></i> 下一個靈感</span>
      <span class="right-hint">上一個靈感 <i class="ti ti-arrow-right"></i></span>
    </div>
    <div class="ctr" id="ectr"></div>
  </div>

  <div id="vs" style="display:none">
    <div class="stats">
      <div class="stat clickable" id="sa" onclick="setF('all')"><b id="cnt-all">0</b><span>已收藏</span></div>
      <div class="stat clickable" id="sp" onclick="setF('pend')"><b id="cnt-pend">0</b><span>未執行</span></div>
      <div class="stat clickable" id="sd" onclick="setF('done')"><b id="cnt-done">0</b><span>已執行</span></div>
    </div>
    <div class="stage" id="sstage"></div>
    <div class="nav-hint" id="snav">
      <span class="left-hint"><i class="ti ti-arrow-left"></i> 下一個靈感</span>
      <span class="right-hint">上一個靈感 <i class="ti ti-arrow-right"></i></span>
    </div>
    <div class="ctr" id="sctr"></div>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none" role="dialog" aria-modal="true">
  <div class="dialog">
    <h3><i class="ti ti-refresh" style="color:#D4537E"></i> 確定要刷新驚喜？</h3>
    <p>系統將從 360 則大資料庫中依序為您抽出「完全不重複」的 12 則全新靈感。您的收藏記錄不會消失。</p>
    <div class="dialog-btns">
      <button class="dbtn cancel" onclick="closeDialog()">取消</button>
      <button class="dbtn confirm" onclick="doRefresh()">確定發送</button>
    </div>
  </div>
</div>

// ==========================================
// 2. 核心演算法：一個月不重複發牌引擎
// ==========================================
var pool = []; 
var eIdx = 0;  
var st = JSON.parse(localStorage.getItem("app_st")) || {};
var flt = 'all';
var sIdx = 0;

if(!window.savedItemsStorage) window.savedItemsStorage = JSON.parse(localStorage.getItem("app_saved")) || [];

var cardOrder = JSON.parse(localStorage.getItem("app_card_order")) || [];
var pointer = parseInt(localStorage.getItem("app_deck_pointer")) || 0;

function initGlobalDeck() {
  var ids = MASTER_DATABASE.map(function(d) { return d.dbId; });
  cardOrder = ids.sort(function() { return Math.random() - 0.5; });
  pointer = 0;
  localStorage.setItem("app_card_order", JSON.stringify(cardOrder));
  localStorage.setItem("app_deck_pointer", pointer);
}

if (cardOrder.length !== MASTER_DATABASE.length) {
  initGlobalDeck();
}

function fetchMonthNoRepeatSurprises() {
  if (pointer + 12 > cardOrder.length) {
    initGlobalDeck();
  }

  var selected = [];
  var batchId = Date.now();

  for (var i = 0; i < 12; i++) {
    var currentDbId = cardOrder[pointer + i];
    var raw = MASTER_DATABASE.find(function(d) { return d.dbId === currentDbId; });
    
    if (!raw) raw = MASTER_DATABASE[i % MASTER_DATABASE.length];

    var item = {
      id: 'item_' + batchId + '_' + i + '_' + raw.dbId, 
      dbId: raw.dbId,
      bc: raw.bc, bl: raw.bl, ic: raw.ic, title: raw.t, desc: raw.d,
      tags: raw.tags.concat(['未讀靈感'])
    };
    selected.push(item);

    if (!st[item.id]) {
      st[item.id] = { saved: false, done: false, doneDate: '' };
    }
  }

  pointer += 12;
  localStorage.setItem("app_deck_pointer", pointer);
  
  return selected;
}

// ==========================================
// 3. 介面互動與狀態更新
// ==========================================
function freshPool(){
  var stage = document.getElementById('estage');
  if (stage) {
    stage.innerHTML = '<div style="text-align:center;color:#993556;padding:2rem;"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px;animation:spin 0.8s linear infinite"></i>正在為您精選完全不重複的點子...</div>';
  }
  
  setTimeout(function(){
    pool = fetchMonthNoRepeatSurprises();
    eIdx = 0;
    buildExplore();
  }, 200); 
}

function getCounts(){
  var all = 0, done = 0;
  Object.keys(st).forEach(function(id){
    var s = st[id];
    if(s.saved || s.done) all++;
    if(s.done) done++;
  });
  return { all: all, done: done, pend: all - done };
}

function upStats(){
  var c = getCounts();
  document.getElementById('n-saved').textContent = c.all;
  document.getElementById('n-done').textContent = c.done;
  document.getElementById('cnt-all').textContent = c.all;
  document.getElementById('cnt-pend').textContent = c.pend;
  document.getElementById('cnt-done').textContent = c.done;
  


  ['all','pend','done'].forEach(function(k){
    var el = document.getElementById('s' + k[0]);
    if(el) el.className = 'stat clickable' + (flt === k ? ' on' : '');
  });
}

function filteredList(){
  return window.savedItemsStorage.filter(function(d){
    var s = st[d.id] || {saved:false, done:false};
    if(!(s.saved || s.done)) return false;
    if(flt === 'pend') return !s.done;
    if(flt === 'done') return s.done;
    return true;
  });
}

function maintainStorage(item, isSavedOrDone) {
  var idx = window.savedItemsStorage.findIndex(function(x){ return x.id === item.id; });
  if(isSavedOrDone && idx === -1) {
    window.savedItemsStorage.push(item);
  } else if(!isSavedOrDone && idx !== -1) {
    window.savedItemsStorage.splice(idx, 1);
  }
  localStorage.setItem("app_saved", JSON.stringify(window.savedItemsStorage));
  localStorage.setItem("app_st", JSON.stringify(st));
}

function cardHTML(item){
  var s = st[item.id] || {saved:false, done:false, doneDate:''};
  var isSaved = s.saved || s.done;
  var isDone = s.done;
  var titleStyle = isDone ? ' style="text-decoration:line-through;opacity:.5;color:#0F6E56"' : '';
  var statusHTML = isDone
    ? '<span class="done-tag"><i class="ti ti-check" style="font-size:11px"></i>已執行' + (s.doneDate ? ' · ' + s.doneDate : '') + '</span>'
    : isSaved ? '<span class="pend-tag">未執行</span>' : '';
  var doneCls = 'donebtn' + (isDone ? ' done' : '') + (isSaved ? '' : ' hidden');
  var doneTxt = isDone ? '<i class="ti ti-rotate-clockwise"></i> 取消執行' : '<i class="ti ti-check"></i> 標記執行';
    
  return '<div class="ind l" id="ind-l">下一則</div>' // 🎯 已取消向右滑出現不喜歡設定，左右滑動回歸順序動線
    + '<div class="ind r" id="ind-r">下一則</div>'
    + '<div class="badge ' + item.bc + '"><i class="ti ' + item.ic + '" style="font-size:12px"></i>' + item.bl + '</div>'
    + '<div class="ctitle"' + titleStyle + '>' + item.title + '</div>'
    + '<div class="cdesc">' + item.desc + '</div>'
    + '<div class="tags">' + item.tags.map(function(t){ return '<span class="tag">#' + t + '</span>'; }).join('') + '</div>'
    + '<div class="status-row">' + statusHTML + '</div>'
    + '<div class="cbot"><div class="cbot-row">'
    + '<button class="savebtn' + (isSaved ? ' on' : '') + '" onclick="tapSave(\'' + item.id + '\')">' + (isSaved ? '已收藏 ♡' : '收藏 ♡') + '</button>'
    + '<button class="' + doneCls + '" onclick="tapDone(\'' + item.id + '\')">' + doneTxt + '</button>'
    + '</div></div>';
}

function buildExplore(anim){
  if(!pool.length || !pool[eIdx]) return;
  var item = pool[eIdx];
  var stage = document.getElementById('estage');
  stage.innerHTML = '<div class="bg3"></div><div class="bg2"></div><div class="card" id="ec">' + cardHTML(item) + '</div>';
  document.getElementById('ectr').textContent = (eIdx + 1) + ' / ' + pool.length;
  if(anim){ document.getElementById('ec').classList.add(anim === 'r' ? 'come-r' : 'come-l'); }
  bindDrag('ec');
  upStats();
}

function tapSave(id){
  if(!st[id]) st[id] = {saved:false, done:false, doneDate:''};
  var s = st[id]; if(s.done) return;
  s.saved = !s.saved;
  var currentItem = pool.find(function(x){return x.id === id;}) || window.savedItemsStorage.find(function(x){return x.id === id;});
  if(currentItem) maintainStorage(currentItem, s.saved || s.done);
  
  rebuildCards(); upStats();
  if(document.getElementById('vs').style.display !== 'none') renderSaved('same');
}

function dateStr(){
  var d = new Date();
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}

function tapDone(id){
  if(!st[id]) st[id] = {saved:false, done:false, doneDate:''};
  var s = st[id]; s.done = !s.done;
  if(s.done){ s.saved = true; s.doneDate = dateStr(); } else { s.doneDate = ''; }
  var currentItem = pool.find(function(x){return x.id === id;}) || window.savedItemsStorage.find(function(x){return x.id === id;});
  if(currentItem) maintainStorage(currentItem, s.saved || s.done);
  
  // 🎯 【終極修復核心】直接進行全局渲染更新，解決任何狀態下的非同步 Bug！
  upStats();
  if(document.getElementById('vs').style.display !== 'none'){
    var list = filteredList();
    if(flt !== 'all') {
      // 在「未執行」或「已執行」分頁，卡片變更狀態後，立刻從該列表重新加載渲染
      if(sIdx >= list.length) sIdx = Math.max(0, list.length - 1);
      renderSaved('same');
    } else {
      // 在「全部已收藏」分頁下，外觀直接連動更新
      var sc = document.getElementById('sc');
      if(sc && list[sIdx]) sc.innerHTML = cardHTML(list[sIdx]);
    }
  } else {
    rebuildCards();
  }
}

function rebuildCards(){
  var ec = document.getElementById('ec');
  if(ec && pool[eIdx]){ ec.innerHTML = cardHTML(pool[eIdx]); bindDrag('ec'); }
  var sc = document.getElementById('sc');
  if(sc){ 
    var list = filteredList(); 
    if(list[sIdx]){ 
      sc.innerHTML = cardHTML(list[sIdx]); bindDrag('sc'); 
    } else {
      renderSaved(); 
    }
  }
}

function askRefresh(){ document.getElementById('overlay').style.display = 'flex'; }
function closeDialog(){ document.getElementById('overlay').style.display = 'none'; }
function doRefresh(){ closeDialog(); freshPool(); }

function setF(f){ flt = f; sIdx = 0; upStats(); renderSaved(); }

function renderSaved(anim){
  var list = filteredList();
  var stage = document.getElementById('sstage');
  var nav = document.getElementById('snav');
  var ctr = document.getElementById('sctr');
  upStats();
  if(list.length === 0){
    nav.style.visibility = 'hidden'; ctr.textContent = '';
    var msg = flt === 'done' ? '還沒有已執行的驚喜，快去行動吧！' : flt === 'pend' ? '沒有未執行項目，你們好棒！' : '還沒有收藏，快去滑動探索卡片吧！';
    stage.innerHTML = '<div class="no-card"><i class="ti ti-heart" style="font-size:24px;color:#ED93B1"></i><p>' + msg + '</p></div>';
    return;
  }
  if(sIdx >= list.length) sIdx = list.length - 1;
  if(sIdx < 0) sIdx = 0;
  nav.style.visibility = 'visible';
  ctr.textContent = (sIdx + 1) + ' / ' + list.length;
  var item = list[sIdx];
  stage.innerHTML = '<div class="bg3"></div><div class="bg2"></div><div class="card" id="sc">' + cardHTML(item) + '</div>';
  if(anim && anim !== 'same'){ var c = document.getElementById('sc'); if(c) c.classList.add(anim === 'r' ? 'come-r' : 'come-l'); }
  bindDrag('sc');
}

// ==========================================
// 4. 手勢物理學（Tinder 滑動交互）
// ==========================================
var drag = { on: false, sx: 0, cx: 0, who: '' };

function bindDrag(cid){
  var c = document.getElementById(cid); if(!c) return;
  var who = cid === 'ec' ? 'e' : 's';
  c.addEventListener('mousedown', function(e){ drag.on = true; drag.sx = e.clientX; drag.cx = 0; drag.who = who; c.classList.add('grab'); e.preventDefault(); });
  c.addEventListener('touchstart', function(e){ drag.on = true; drag.sx = e.touches[0].clientX; drag.cx = 0; drag.who = who; }, { passive: true });
}

document.addEventListener('mousemove', function(e){ if(!drag.on) return; drag.cx = e.clientX - drag.sx; applyDrag(drag.cx); });
document.addEventListener('touchmove', function(e){ if(!drag.on) return; drag.cx = e.touches[0].clientX - drag.sx; applyDrag(drag.cx); }, { passive: true });

function applyDrag(dx){
  var c = document.getElementById(drag.who === 'e' ? 'ec' : 'sc');
  var il = document.getElementById('ind-l'); var ir = document.getElementById('ind-r');
  if(!c) return;
  c.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx * .065) + 'deg)';
  var r = Math.min(Math.abs(dx) / 80, 1);
  // 🎯 【取消設定】向右滑不再顯示「不喜歡」字樣（將 il 限制為僅在左滑時觸發或全關閉，此處全面保留流暢換牌動線提示）
  if(il) il.style.opacity = dx < 0 ? r : 0;
  if(ir) ir.style.opacity = dx > 0 ? r : 0;
}

document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

function endDrag(){
  if(!drag.on) return;
  var who = drag.who; var cx = drag.cx; drag.on = false;
  var c = document.getElementById(who === 'e' ? 'ec' : 'sc');
  if(c) c.classList.remove('grab');
  if(cx < -60) doSlide('l', who);
  else if(cx > 60) doSlide('r', who);
  else{
    if(c) c.style.transform = '';
    var il = document.getElementById('ind-l'); var ir = document.getElementById('ind-r');
    if(il) il.style.opacity = 0; if(ir) ir.style.opacity = 0;
  }
  drag.cx = 0;
}

function doSlide(dir, who){
  var c = document.getElementById(who === 'e' ? 'ec' : 'sc'); if(!c) return;
  c.classList.add(dir === 'l' ? 'go-l' : 'go-r');
  setTimeout(function(){
    if(who === 'e'){
      var next = dir === 'l' ? (eIdx - 1 + pool.length) % pool.length : (eIdx + 1) % pool.length;
      eIdx = next; buildExplore(dir === 'l' ? 'r' : 'l');
    }else{
      var list = filteredList(); if(!list.length){ renderSaved(); return; }
      sIdx = dir === 'l' ? (sIdx - 1 + list.length) % list.length : (sIdx + 1) % list.length;
      renderSaved(dir === 'l' ? 'r' : 'l');
    }
  }, 260);
}

function goTab(t){
  document.getElementById('ve').style.display = t === 'e' ? '' : 'none';
  document.getElementById('vs').style.display = t === 's' ? '' : 'none';
  document.getElementById('te').className = 'tab' + (t === 'e' ? ' on' : '');
  document.getElementById('ts').className = 'tab' + (t === 's' ? ' on' : '');
  if(t === 's'){ sIdx = 0; renderSaved(); }
}

var style = document.createElement('style');
style.innerHTML = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// 開機無延遲初始化
freshPool();
// PWA Service Worker 註冊
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
    .then(function(){ console.log("SW registered"); })
    .catch(function(e){ console.log("SW error", e); });
}
